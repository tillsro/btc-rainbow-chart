<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reset BTC Rainbow Chart Cache</title>
<style>
body{margin:0;background:#070b12;color:#e5edf6;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;display:grid;place-items:center;min-height:100vh;padding:24px}main{max-width:520px;background:#0d111b;border:1px solid #263241;border-radius:16px;padding:22px;box-shadow:0 20px 70px rgba(0,0,0,.45)}h1{margin:0 0 8px;font-size:22px}p{color:#9aa7b7;line-height:1.5}button,a{display:inline-block;border:1px solid #33536c;background:#132234;color:#eaf6ff;border-radius:12px;padding:10px 13px;font-weight:700;text-decoration:none;margin-top:8px}
</style>
</head>
<body>
<main>
<h1>Resetting app cache</h1>
<p id="status">Clearing old service worker and cached files...</p>
<a id="link" href="./?v=granularity-v5" style="display:none">Open updated chart</a>
</main>
<script>
(async function(){
  const status=document.getElementById('status');
  try{
    if('serviceWorker' in navigator){
      const regs=await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r=>r.unregister()));
    }
    if('caches' in window){
      const keys=await caches.keys();
      await Promise.all(keys.map(k=>caches.delete(k)));
    }
    status.textContent='Cache cleared. Opening updated chart...';
    location.replace('./?v=granularity-v5&ts='+Date.now());
  }catch(e){
    status.textContent='Cache reset could not complete automatically. Use the button below.';
    document.getElementById('link').style.display='inline-block';
  }
})();
</script>
</body>
</html>
